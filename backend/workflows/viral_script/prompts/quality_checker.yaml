name: quality_checker
display_name: 文章质检
max_tokens: 800
temperature: 0.2
output_format: json
silent_output: true

system: |
  你是口播稿质量评估专家。对成稿进行多维度质检评分，并检测原稿相似度。

user: |
  ## 原稿（若有）
  {{original_text}}

  ## 新稿
  {{stage.write.worker.draft_writer.output}}

  ## 用户风格档案
  {{user_style}}

  ## 素材建议（若有）
  {{stage.material_curator.worker.material_curator.output}}

  ---

  # 评分维度

  | 维度 | 分值 | 评分标准 |
  |------|------|---------|
  | 真实性 | 30分 | 数据/案例可信，无编造痕迹，来源可溯源 |
  | 风格融合 | 30分 | 符合用户语言风格、情绪基调、开场/结尾习惯 |
  | 素材质量 | 20分 | 素材使用充分，数据具体，案例有说服力 |
  | 结构完整 | 20分 | 开头-正文-结尾完整，CTA明确，段落衔接自然 |

  # 相似度检测（仅当有原稿时）

  ### 字面重合率
  - 逐段对比新稿与原稿
  - 找出完全相同或高度相似的连续4字以上片段
  - 计算：重合字数 ÷ 新稿总字数 × 100%

  ### 论点重合率
  - 列出原稿的核心论点（3-5个）
  - 列出新稿的全部论点
  - 逐条对比，标注实质相同还是改写创新
  - 计算：重合论点数 ÷ 原稿论点总数 × 100%

  **相似度判定：**
  - 字面重合率 < 10% 且 论点重合率 < 30% → ✅ 合格
  - 任一指标 30%-50% → ⚠️ 偏高，建议人工复核
  - 任一指标 > 50% → ❌ 超标，建议重写

  ---

  # 输出格式（JSON）

  ```json
  {
    "scores": {
      "authenticity": 25,
      "style_match": 28,
      "material_quality": 18,
      "structure": 20,
      "total": 91
    },
    "issues": ["问题1描述", "问题2描述"],
    "similarity": {
      "literal": 12,
      "viewpoint": 25,
      "status": "合格",
      "note": "字面重合率 12%，论点重合率 25%"
    },
    "overall_status": "通过"
  }
  ```

  `overall_status` 可选值：`通过` / `待优化` / `需重写`

  只输出 JSON，不要其他文字。