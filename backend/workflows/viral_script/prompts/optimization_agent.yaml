name: optimization_agent
display_name: 优化审查
max_tokens: 3000
temperature: 0.2
output_format: text
silent_output: true

system: |
  你是一位严格的质检专家。负责对【创作大纲】进行全面审查，确保质量达标。

user: |
  ## 原稿（仅用于相似度比对）
  {{original_text}}

  ## 用户风格档案
  {{user_style}}

  ## 创作大纲
  {{stage.create.worker.creative_agent.output}}

  ## 素材建议（若有）
  {{stage.material_curator.worker.material_curator.output}}

  ---

  请按以下维度进行全面质检：

  ## 一、真实性检测（0-10分）
  - 是否是真实的口播稿风格？
  - 论据、数据、案例是否可信？
  - 是否有明显的虚假或编造痕迹？

  ## 二、风格符合度（0-30分）
  - 是否符合创作者的语言风格？
  - 开场类型是否符合创作者习惯？
  - 结尾风格是否符合创作者习惯？
  - 情绪基调是否匹配？

  ## 三、素材质量（0-30分）
  - 是否有效使用了提供的素材？
  - 素材使用是否具体、有说服力？
  - 是否有遗漏的重要数据/案例？
  - 若无素材输入，评估内容充实度

  ## 四、结构质量（0-30分）
  - 开头是否有足够强的钩子？
  - 正文推进逻辑是否清晰？
  - 段落之间衔接是否自然？
  - 结尾CTA是否明确有力？

  ## 五、原稿相似度检测
  **仅当有原稿时执行，无原稿则跳过此项**

  ### 5.1 字面重合率
  - 逐段对比改写稿与原稿
  - 找出完全相同或高度相似的连续4字以上片段
  - 计算：重合字数 ÷ 改写稿总字数 × 100%

  ### 5.2 论点重合率
  - 列出原稿的核心论点（3-5个）
  - 列出大纲的全部论点
  - 逐条对比，标注实质相同还是改写创新
  - 计算：重合论点数 ÷ 原稿论点总数 × 100%

  **相似度判定：**
  - 字面重合率 < 10% 且 论点重合率 < 30% → ✅ 合格
  - 任一指标 30%-50% → ⚠️ 偏高，建议人工复核
  - 任一指标 > 50% → ❌ 超标，建议重写

  ---

  ## 输出格式

  ### 📊 总分：XX/100

  ### 各维度得分

  | 维度 | 得分 | 说明 |
  |------|------|------|
  | 真实性 | X/10 | ... |
  | 风格符合度 | X/30 | ... |
  | 素材质量 | X/30 | ... |
  | 结构质量 | X/30 | ... |

  ### 问题清单（如有）
  1. [问题描述] → 建议：[改进方向]
  2. ...

  ### 相似度检测结果（若有原稿）

  **字面重合率：X%**
  - 重合片段：「...」
  - ...

  **论点重合率：X%**
  - 原稿论点：① ... ② ... ③ ...
  - 大纲论点：① ... ② ... ③ ...
  - 重合标注：[哪些实质相同]

  **判定：** ✅ 合格 / ⚠️ 偏高 / ❌ 超标

  ### 总体评价
  [一句话总结大纲质量，是否可以进入撰写阶段]

  ---

  **若总分 ≥ 70 且 无 ❌ 超标项：** 输出「✅ 通过质检，可以进入撰写阶段」

  **若总分 < 70 或 有 ❌ 超标项：** 输出具体问题清单，并建议「需要重新调整大纲」