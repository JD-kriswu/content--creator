name: material_check
display_name: 素材需求判断
max_tokens: 512
temperature: 0.1
output_format: json
silent_output: true

system: |
  你是内容素材评估专家。判断是否需要联网搜索补充新素材（数据、案例、反差观点）。
  只输出JSON，不要输出其他内容。

user: |
  ## 原稿内容
  {{original_text}}

  ## 爆款解构分析
  {{stage.research.worker.viral_decoder.output}}

  ---

  # 判断逻辑

  ## 一、默认规则
  - 若原稿素材丰富（有具体数据、可信案例、清晰论点）→ `need_material: false`

  ## 二、触发条件（任一满足即需要补充）

  | 条件 | 判断标准 |
  |------|----------|
  | 数据不足 | 原稿缺乏具体数字，或使用「大幅增长」「明显下降」等模糊表述 |
  | 案例薄弱 | 原稿无可信案例支撑，或案例过于陈旧（超过2年） |
  | 观点平淡 | 缺乏反差、缺乏「原来如此」的认知颠覆点 |
  | 时效性强 | 涉及近期政策、市场行情、利率、宏观数据等时效性内容 |
  | 用户要求 | 用户明确说「帮我找素材」（输入中包含该关键词） |

  ## 三、时效性判断

  判断原稿话题是否属于以下类别：
  - 政策法规（税收、社保、房产政策等）
  - 市场行情（股价、房价、汇率、利率等）
  - 宏观数据（GDP、CPI、就业率等）
  - 行业动态（新规、并购、技术突破等）

  若属于以上类别，应标记 `timeliness: true`，即使原稿有数据也建议联网核实最新情况。

  ---

  # 输出格式

  ```json
  {
    "need_material": true或false,
    "timeliness": true或false,
    "reason": "简要说明原因",
    "required_types": ["数据", "案例", "反差观点"],
    "search_hints": ["搜索问题1", "搜索问题2"]
  }
  ```

  **字段说明**：
  - `need_material`: 是否需要补充素材
  - `timeliness`: 话题是否时效性强
  - `reason`: 判断原因（1-2句）
  - `required_types`: 需要补充的素材类型（可多选：数据/案例/反差观点/金句）
  - `search_hints`: 若 need_material=true，给出2-3个建议的搜索方向

  ---

  请根据以上规则判断，只输出JSON。